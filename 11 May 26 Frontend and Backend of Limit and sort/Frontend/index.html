<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Users Dashboard</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <!-- Sidebar -->
      <aside class="sidebar">
        <h2>User Panel</h2>

        <nav>
          <button class="nav-btn active">All Users</button>
          <button class="nav-btn">Young Users</button>
          <button class="nav-btn">Adults</button>
          <button class="nav-btn">Profile Page</button>
        </nav>
      </aside>

      <!-- Main Content -->
      <main class="main-content">
        <!-- Header -->
        <div class="top-bar">
          <h1>Users Dashboard</h1>

          <div class="actions">
            <!-- Search -->
            <input
              type="text"
              id="searchInput"
              placeholder="Search user by name..."
            />

            <!-- Sort -->
            <select id="sortAge">
              <option value="">Sort By Age</option>
              <option value="asc">Age: Low to High</option>
              <option value="desc">Age: High to Low</option>
            </select>
          </div>
        </div>

        <!-- User Cards -->
        <div class="users-grid" id="usersContainer">
          <!-- User Card -->
          <div class="user-card">
            <div class="avatar">B</div>

            <h3>Bilal</h3>

            <p><strong>Email:</strong> bilal@gmail.com</p>
            <p><strong>Age:</strong> 18</p>

            <div class="card-buttons">
              <button class="view-btn">View</button>
              <button class="delete-btn">Delete</button>
            </div>
          </div>
        </div>

        <!-- Pagination -->
        <div class="pagination">
          <button id="prevBtn">Previous</button>

          <div class="page-numbers">
            <button class="page active">1</button>
            <button class="page">2</button>
            <button class="page">3</button>
          </div>

          <button id="nextBtn">Next</button>
        </div>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
